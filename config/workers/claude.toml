# Default Claude worker for Jarvis.
#
# This manifest replaces the hard-coded ClaudeAgent shipped by earlier
# versions. Edit any field here to customise Claude's voice behaviour;
# `[agent].options` in `config.toml` is deprecated and ignored when the
# manifest is loaded.
#
# Placeholders Jarvis fills at spawn time:
#   {prompt}      — the resolved user query (Jarvis writes it to
#                   claude's stdin, so it does NOT appear in `command`)
#   {session_id}  — the Claude session UUID Jarvis is resuming
#   {cwd}         — the working directory Jarvis is dispatching from

id = "claude"
description = "Claude Code session via `claude --print`"

# Stateful — Claude persists its own JSONL transcript per session UUID;
# Jarvis only tracks which UUID belongs to the current thread.
stateful = true

# Eligible for "spawn and forget" task delegation (hija E1). Claude jobs
# that take minutes are exactly the case async workflows were added for.
async_eligible = true

# Plain pipes are fine — `claude --print` doesn't require a TTY.
tty = false

dispatch_hint = "Best for code refactoring, debugging, implementation, and any task that benefits from filesystem access or tool use."

# When we already have a session UUID for this thread, resume it.
command = [
    "claude",
    "--print",
    "--append-system-prompt",
    "You are a voice assistant. Reply concisely in 1-3 sentences unless the user explicitly asks for detail. Avoid markdown — your reply will be spoken aloud.",
    "--resume",
    "{session_id}",
]

# First invocation of Claude on a fresh thread: no UUID to resume yet.
# Falls back to `command` if missing, so users who want the same shape
# either way can omit this section.
initial_command = [
    "claude",
    "--print",
    "--append-system-prompt",
    "You are a voice assistant. Reply concisely in 1-3 sentences unless the user explicitly asks for detail. Avoid markdown — your reply will be spoken aloud.",
]
