# ============================================================================
#  Jarvis configuration
#  Location:
#    Linux/BSD:  $XDG_CONFIG_HOME/jarvis/config.toml  (~/.config/jarvis/config.toml)
#    macOS:      ~/Library/Application Support/jarvis/config.toml
#  Edit and then:  systemctl --user restart jarvis   (or just rerun `jarvis listen`)
# ============================================================================

# Schema version. Bumped when fields are removed or renamed. If your binary
# expects a higher version than this file declares, `jarvis` refuses to start
# and tells you to run `jarvis setup` to regenerate. Adding new fields with
# defaults does not require a bump.
config_version  = 2

log_level       = "INFO"     # error | warn | info | debug | trace
speak_responses = true       # set false to print replies only (no TTS)

# ----------------------------------------------------------------------------
#  Wake word (optional, hands-free trigger)
# ----------------------------------------------------------------------------
# Hotkey-driven is the default: bind `jarvis listen` to a global hotkey in
# your WM (Hyprland, sway, GNOME, macOS Shortcuts, ...). Set enabled = true
# only if you want the always-listening mode.
#
# Backends:
#   "none"          hotkey only (default)
#   "whisper"       reuses whisper-cli; matches `phrases` against transcripts.
#                   Custom words work out of the box ("mutombo" is fine).
#                   No new deps. Latency 400-900 ms on CPU.
#   "sherpa"        sherpa-onnx KWS (ROADMAP — not yet implemented).
#                   Would offer ~80 ms latency.
#   "openwakeword"  pre-trained models (hey_jarvis, alexa, ...) (ROADMAP).
#   "rustpotter"    trained from your own voice samples (ROADMAP).
[wake]
enabled            = false
backend            = "none"
phrases            = ["jarvis"]
# VAD trigger RMS. 0.015 catches whispers; 0.05 ignores soft talk.
# Once *in* an utterance, the sustain threshold (= trigger * sustain_factor)
# takes over so soft consonants (m, n, t, s) don't cut the word short.
vad_rms_threshold  = 0.02
sustain_factor     = 0.5
# Pre-roll ring of leading audio. Without this the first ~100 ms of the
# word — the consonant onset — gets clipped because RMS hasn't crossed
# the trigger yet ("mutombo" → "Combo").
preroll_seconds    = 0.3
silence_seconds    = 0.8    # trailing silence that ends an utterance
max_listen_seconds = 3.0    # cap on one utterance before forced transcribe
cooldown_seconds   = 2.0
# Optional: use a smaller/faster Whisper model for the always-on wake loop
# while [stt].model stays a heavier one for the actual command. Recommended
# pairing: stt.model = large-v3 + wake.stt_model_override = base/tiny.
# stt_model_override = "/home/you/.local/share/jarvis/whisper/ggml-base.bin"
# Optional: use a smaller/faster Whisper model for the always-on wake loop
# while [stt].model stays a heavier one for the actual command. Recommended
# pairing: stt.model = large-v3 + wake.stt_model_override = base/tiny.
# stt_model_override = "/home/you/.local/share/jarvis/whisper/ggml-base.bin"

# ----------------------------------------------------------------------------
#  Recorder (captures audio to a WAV for the STT backend)
# ----------------------------------------------------------------------------
# backend = "auto" picks the first of parecord / pw-record / arecord / ffmpeg
# found on PATH. Override for a specific recorder.
[record]
backend         = "auto"
# device        = "default"
sample_rate     = 16000
channels        = 1
max_seconds     = 15.0
silence_seconds = 1.5
silence_threshold_db = -40.0   # dBFS below which audio counts as silence.
                                # Default tuned for normal USB headset / laptop
                                # mic (speech ~-25 to -33 dBFS, idle ~-44 to
                                # -52 dBFS, with inter-word articulation dips
                                # that need to stay above threshold). Tighten
                                # toward -30 if your mic picks up natural
                                # pauses as voice.
# command         = ["arecord", "-r", "16000", "-f", "S16_LE", "{out}"]

# ----------------------------------------------------------------------------
#  Speech to text — shells out to a transcription binary, no inference here
# ----------------------------------------------------------------------------
# Default: whisper-cli (from whisper.cpp). Install with:
#   Arch:  pacman -S whisper.cpp
#   macOS: brew install whisper-cpp
# Download a ggml model (e.g. base.en) and point `model` at it.
[stt]
backend    = "whisper-cli"
binary     = "whisper-cli"
model      = "/usr/share/whisper.cpp/models/ggml-base.en.bin"
language   = "en"
threads    = 4

# GPU acceleration:
# whisper.cpp uses your GPU automatically when the binary was compiled with
# CUDA / Vulkan / Metal / ROCm support — the Arch AUR `whisper.cpp` ships
# with Vulkan, so most users do not need to touch these settings.
#
# use_gpu     omit (default) → let whisper.cpp decide (uses GPU if available)
#             false         → force CPU (`--no-gpu`)
# gpu_device  uint          → pick GPU index N on multi-GPU systems (CUDA only)
# flash_attn  bool          → enable flash-attention (Ampere/Hopper/Apple Silicon)
# use_gpu     = false
# gpu_device  = 0
flash_attn  = false

extra_args = []
# For any other tool, switch to backend = "command" and set:
# command = ["my-transcribe", "--input", "{wav}"]

# ----------------------------------------------------------------------------
#  Text to speech — also subprocess-based
# ----------------------------------------------------------------------------
# Piper voices auto-download to ~/.local/share/jarvis/piper/ on first use.
# Browse voices: https://huggingface.co/rhasspy/piper-voices
#
# IMPORTANT (Arch): the package in the official repo named `piper` is a GTK
# app for gaming mice, NOT the TTS. You want `piper-tts` from the AUR:
#   yay -S piper-tts
# If `piper-tts` installs the binary under a different name, set
# `piper_binary` accordingly. If you don't want to bother, set
# `backend = "espeak"` (universal but robotic) or `backend = "none"` to
# print replies instead of speaking them.
[tts]
backend          = "piper"            # piper | espeak | command | none
voice            = "en_US-lessac-medium"
piper_binary     = "piper"
# piper_model_path = "/path/to/voice.onnx"
espeak_voice     = "en"
rate             = 175
# command          = ["my-tts", "--text", "{text}"]

# ----------------------------------------------------------------------------
#  Agent — the AI CLI we send transcripts to and get replies from
# ----------------------------------------------------------------------------
# Built-ins: claude | openai | gemini | shell
# Plugin model: any binary or script that reads the prompt on stdin and
# writes the reply on stdout. Set `name = "shell"` and `command = [...]`
# to use it; that's how Ollama, Warp's CLI, or AI-generated plugins plug in.

[agent]
name = "claude"
# binary       = "claude"
# cwd          = "/home/you/projects"
# timeout      = 60
# system_prompt = "You are a voice assistant. Reply in 1-3 sentences."
# extra_args   = ["--model", "claude-opus-4-7"]

# ---- OpenAI / ChatGPT ------------------------------------------------------
# name        = "openai"
# model       = "gpt-4o-mini"
# temperature = 0.6
# Expects OPENAI_API_KEY in the environment.

# ---- Gemini ----------------------------------------------------------------
# name  = "gemini"
# model = "gemini-1.5-flash"
# Expects GEMINI_API_KEY (or GOOGLE_API_KEY).

# ---- Warp (oz CLI) ---------------------------------------------------------
# Wraps `oz agent run --prompt …`. The Warp local agent can pick among
# several models via `--model` and has access to MCP servers. Expects
# WARP_API_KEY in env (or set `api_key` here). The legacy binary `warp-cli`
# is auto-detected as a fallback but is deprecated upstream — install via
# Warp.app's Command Palette → "Install Oz CLI Command", or
# `brew install --cask oz` on macOS.
# name    = "warp"
# binary  = "oz"          # also accepts "oz-preview"; auto-detected if unset
# model   = "claude-3.7-sonnet"
# profile = "<profile-id>"
# cwd     = "/home/you/projects"
# api_key = "wk-..."      # prefer WARP_API_KEY env var instead

# ---- Shell (Ollama, custom script, agent-generated plugin) -----------------
# name    = "shell"
# command = ["ollama", "run", "llama3"]
# timeout = 60

# ----------------------------------------------------------------------------
#  Conversation session — agent continuity across wake events
# ----------------------------------------------------------------------------
# When enabled, each turn (recorded utterance) is appended to a JSON-backed
# session file at ~/.cache/jarvis/sessions/current.json. The agent receives
# the accumulated history, so "¿qué tiempo hace?" → answer → "y mañana?"
# works without re-stating context. Saying one of the reset phrases below
# wipes the session by voice (forwarded to NO agent — it's caught locally).
[session]
enabled              = true
ttl_seconds          = 1800     # session expires after 30 min idle (0 = never)
max_turns            = 30       # keep at most this many turns in the prompt
followup_window_secs = 10.0     # after each daemon turn, keep listening this
                                # long without re-requiring the wake word (0
                                # disables follow-up; conversations chain
                                # naturally for short clarifications)
reset_phrases = [
    "olvida", "olvidalo", "olvida todo",
    "nueva conversacion", "nueva conversación",
    "new conversation", "forget", "forget everything", "reset",
]
