version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      runtime:
        patterns: ["*"]
        exclude-patterns: ["pytest*", "ruff*", "mypy*", "pre-commit*", "build"]
      dev:
        patterns: ["pytest*", "ruff*", "mypy*", "pre-commit*", "build"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "github-actions"]
